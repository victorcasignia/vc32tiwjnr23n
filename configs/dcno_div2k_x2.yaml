model:
  name: "dcno"
  in_channels: 3
  out_channels: 3
  hidden_dims: [64, 128, 256, 512]
  depths: [2, 2, 4, 2]
  dct_block_size: 8
  transform_type: "dct"    # "dct" or "dwt"
  num_heads: 8
  mode_weighting: true
  dropout: 0.0
  scale_factor: 2
  # --- ablation flags ---
  residual_learning: false          # diffuse (HR - bicubic(LR)) instead of HR
  spectral_conv_size: 1             # 1 = pointwise, 3 = cross-block spectral conv
  spatial_dual_path: false          # add depthwise-sep 3×3 spatial block per DCNOBlock
  freq_norm: false                  # learnable per-channel spectral normalisation
  progressive_stem: false           # multi-layer stem/head to ease spectral compression
  concat_cond: false                 # concatenate LR with x_t at input (standard SR3 approach)
  input_proj: false                  # pixel-space x_t projection (bypasses DCT for denoising)

diffusion:
  type: "rectified_flow"
  num_train_timesteps: 1000
  num_inference_steps: 10
  beta_schedule: "linear"
  prediction_type: "velocity"       # velocity for rectified flow
  consistency_training: false
  consistency_steps: 1
  ode_solver: "euler"               # euler | midpoint | adaptive

training:
  epochs: 300
  batch_size: 16
  accumulation_steps: 1
  learning_rate: 2.0e-4
  weight_decay: 0.01
  optimizer: "adamw"
  muon_momentum: 0.95
  sgd_momentum: 0.9
  nesterov: true
  ema_decay: 0.9999
  gradient_clip: 1.0
  mixed_precision: true
  scheduler:
    type: "cosine"
    warmup_steps: 1000
    min_lr: 1.0e-6
    T_max: null                     # defaults to total steps
  early_stopping:
    enabled: true
    patience: 30
    min_delta: 0.0

data:
  train_dataset: "div2k"
  val_dataset: "div2k"
  test_datasets: ["set5", "set14", "bsd100", "urban100"]
  data_dir: "./data"
  patch_size: 256                   # HR patch size for training
  augment: true                     # random flip + rotation
  num_workers: 4
  pin_memory: true
  # subset: 0.1                    # uncomment to use 10% of data for quick convergence test

logging:
  project: "dcno-super-resolution"
  run_name: "dcno-div2k-x2"
  log_interval: 100                 # log every N steps
  val_start_epoch: 200                  # skip validation before this epoch
  val_interval: 5                   # validate every N epochs
  save_interval: 10                 # save checkpoint every N epochs
  sample_interval: 5                # generate samples every N epochs

checkpoint:
  dir: "./checkpoints"
  save_best: true
  save_last: true
  max_keep: 5
